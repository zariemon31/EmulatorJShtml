<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EmulatorJS Minimal Test</title>
</head>
<body>
  <h1>EmulatorJS Minimal</h1>
  <input id="rom-input" type="file" accept=".sfc,.smc,.nes,.gba,.bin,.zip" />
  <div id="status"></div>

  <script>
    // 公式 CDN の data パスを指定（EmulatorJS がコアを fetch する先）
    window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";

    // CDN の emulator 本体を読み込む
  </script>
  <script src="https://cdn.emulatorjs.org/stable/emulator.min.js"></script>

  <script>
    const romInput = document.getElementById('rom-input');
    const status = document.getElementById('status');

    romInput.addEventListener('change', async (e) => {
      const f = e.target.files && e.target.files[0];
      if (!f) return;
      status.textContent = '読み込み中: ' + f.name;
      try {
        const ab = await f.arrayBuffer();
        if (window.EmulatorJS && typeof window.EmulatorJS.run === 'function') {
          await window.EmulatorJS.run({ romBuffer: ab, romName: f.name });
          status.textContent = '起動しました: ' + f.name;
        } else {
          status.textContent = 'EmulatorJS の起動関数が見つかりません。Console を確認してください。';
          console.log(window.EmulatorJS);
        }
      } catch (err) {
        console.error(err);
        status.textContent = '起動エラー。Console を確認してください。';
      }
    });
  </script>
</body>
</html>

<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>EmulatorJS Minimal Test</title>
</head>
<body>
  <h1>EmulatorJS Minimal</h1>
  <div id="drop-area" style="width:640px;height:360px;border:1px solid #333;">
    <input id="rom-input" type="file" accept=".zip,.nes,.sfc,.smc,.gba,.bin,.iso,.img" />
    <div>ROM を選択してください</div>
  </div>

  <div id="status"></div>

  <!-- 1) EJS_pathtodata を CDN に向ける -->
  <script>
    window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
  </script>

  <!-- 2) 公式 CDN の emulator.min.js を読み込む -->
  <script src="https://cdn.emulatorjs.org/stable/emulator.min.js"></script>

  <!-- 3) 最小の UI 起動コード -->
  <script>
    const romInput = document.getElementById('rom-input');
    const status = document.getElementById('status');

    romInput.addEventListener('change', async (e) => {
      const f = e.target.files && e.target.files[0];
      if (!f) return;
      status.textContent = '読み込み中: ' + f.name;
      const ab = await f.arrayBuffer();
      try {
        if (window.EmulatorJS && typeof window.EmulatorJS.run === 'function') {
          await window.EmulatorJS.run({ romBuffer: ab, romName: f.name });
          status.textContent = '起動しました: ' + f.name;
        } else {
          status.textContent = 'EmulatorJS の起動関数が見つかりません。';
          console.log(window.EmulatorJS);
        }
      } catch (err) {
        console.error(err);
        status.textContent = '起動エラー。Console を確認してください。';
      }
    });
  </script>
</body>
</html>
